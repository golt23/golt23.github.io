<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

</head>
<style>
    @font-face {
  font-family: "FixedSys";
  src: url("fonts/fixedsys.ttf") format("truetype");
    }
    @font-face {
    font-family: "Cordata";
    src: url("fonts/Px437_Cordata_PPC-400.ttf") format("truetype");
  }
  @font-face {
    font-family: "IBM3xalt2";
    src: url("fonts/Px437_IBM_Model3x_Alt2.ttf") format("truetype");
  }
    body {
      font-family: "FixedSys", "Courier New", Courier, monospace;
      margin: 0;
      padding: 10px;
      background:black;
      color: #920d0d;
      
    }
    header {
      text-align: center;
      padding: 10px 0;
      font-size: 22px;
    }
    nav {
  height: 11px;                    /* thick stripe */
  background: black;              /* inner stripe color */
  border: 4px solid rgb(158, 5, 5); /* outer border of the stripe */
  display: flex;
  justify-content: center;        /* center the tabs */
  align-items: center;
  margin-top: 10px;
  margin-bottom: 20px;
}

nav a {
  display: inline-block;
  margin: 0 10px;                 /* space between tabs */
  padding: 5px 10px;
  font-size: 22px;
  font-family: "IBM3xalt2", monospace;

  color: rgb(158, 5, 5);
  background: black;
  border: 4px solid rgb(158, 5, 5);

  text-decoration: none;
}

/* optional: hover */
nav a:hover {
  color: rgb(199, 0, 0);
  background: black;
  border-color: rgb(167, 0, 0);
}
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 0;
    }
    footer {
      text-align: center;
      padding: 15px;
      font-size: 19px;

    }
    .h {
        text-align: center;
        font-size: 36px;
        font-family: "FixedSys", "Courier New", Courier, monospace;
        margin-top: 50px;
        margin-bottom: 1px;
        padding: 4px;
        color: #920d0d;
    }
    .p {
        text-align: left;
        padding-left: 150px;
        font-size: 22px;
        font-family: "IBM3xalt2", monospace;
        margin: 5px;
        color: #920d0d;
    }
    .p- {
        text-align: center;
        font-size: 18px;
        font-family: "IBM3xalt2", monospace;
        margin: 5px;
        color: #920d0d;
    }
    .postdiv {
      border: 5px solid #920d0d;
      background: black;
      padding: 15px;
      border-radius: 10px;
      margin: 35px;
      margin-top: 50px;
    }

  </style>

<body>
   <header>
     <h1>VOID Initiation</h1>
     <p>Open Source Human Mycelium</p>
  </header>

  <nav>
    <a href="index.html">home⚝</a>
    <a href="blog.html">blog𓇻</a>
    <a href="services.html">services✰</a>
    <a href="socials.html">socials✰</a>
  </nav>

  
  <article class="single-post">
    <div class="postdiv">
    <h1 class="h" id="post-title"></h1>
    <p class="p-" id="post-date"></small>
    <p class="p" id="post-content"></p>
    </div>
  </article>

  <script>
    // get id from URL (e.g. ?id=1)
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");

    if (!id) {
      document.querySelector(".single-post").innerHTML = "<p>Post not found.</p>";
    } else {
      // load posts-data.json from root
      fetch("/posts-data.json")
        .then((res) => res.json())
        .then((posts) => {
          const post = posts.find((p) => p.id === id);
          if (!post) {
            document.querySelector(".single-post").innerHTML = "<p>Post not found.</p>";
          } else {
            document.getElementById("post-title").textContent = post.title;
            document.getElementById("post-date").textContent = post.date;
            document.getElementById("post-content").innerHTML = post.content;
          }
        })
        .catch((err) => {
          console.error("Error loading post data:", err);
          document.querySelector(".single-post").innerHTML = "<p>Failed to load post.</p>";
        });
    }
  </script>
   <footer>
    &copy; 2026 VOID Initiation
  </footer>
</body>
