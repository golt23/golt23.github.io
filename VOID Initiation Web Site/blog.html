    header {
      text-align: center;
      padding: 30px 0;
    }
    nav {
      background: #333;

    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-size: 1.1em;
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 0;
    }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      color: #777;
    }
  </style>
</head>
<body>
  <header>
    <h1>Indie Old‑School Blog</h1>
    <p>A cosy place for thoughts, music, and esoteric stuff.</p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="services.html">Services</a>

  <main>
    <h2>Blog</h2>
  
    <div class="blog-list">
      <article class="blog-item">
        <a href="posts/post1.html">

    </div>
  
    <style>
      .blog-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 20px;
      }
      .blog-item {
        background: white;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #ddd;
      }
      .blog-item img {
        max-width: 100%;
        height: auto;
        border-radius: 6px;
      }
      .category {
        display: inline-block;
        font-size: 0.85em;
        background: #efe5ff;
        color: #4c1d95;
        padding: 3px 8px;
        border-radius: 4px;
